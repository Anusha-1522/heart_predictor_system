<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartCare AI - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:#60a5fa;
border-radius:50%;
top:-150px;
left:-150px;
filter:blur(130px);
opacity:.45;
}

body::after{
content:'';
position:absolute;
width:450px;
height:450px;
background:#2563eb;
border-radius:50%;
bottom:-150px;
right:-150px;
filter:blur(130px);
opacity:.45;
}

.login-box{

width:420px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(20px);
box-shadow:0 20px 50px rgba(0,0,0,.3);
color:white;
position:relative;
z-index:5;
}

.logo{

width:90px;
height:90px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:white;
margin-bottom:20px;
animation:pulse 2s infinite;

}

.logo i{

font-size:42px;
color:#ef4444;

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}

}

h1{

text-align:center;
font-size:32px;
margin-bottom:8px;

}

.subtitle{

text-align:center;
opacity:.85;
margin-bottom:35px;

}

.input-box{

margin-bottom:22px;
position:relative;

}

.input-box label{

display:block;
margin-bottom:8px;
font-size:15px;

}

.input-box input{

width:100%;
padding:15px 18px;
border:none;
outline:none;
border-radius:12px;
font-size:15px;

}

.input-box i{

position:absolute;
right:18px;
top:47px;
color:#666;
cursor:pointer;

}

.options{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
font-size:14px;

}

.options a{

color:white;
text-decoration:none;

}

.options a:hover{

text-decoration:underline;

}

button{

width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#2563eb;
font-size:17px;
font-weight:600;
cursor:pointer;
color:white;
transition:.3s;

}

button:hover{

background:#1d4ed8;
transform:translateY(-2px);

}

#error{

display:none;
margin-top:20px;
padding:12px;
background:#ef4444;
border-radius:10px;
text-align:center;
font-size:14px;

}

.loading{

display:none;
margin-top:20px;
text-align:center;

}

.footer{

margin-top:30px;
text-align:center;
font-size:13px;
opacity:.8;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<i class="fas fa-heartbeat"></i>

</div>

<h1>HeartCare AI</h1>

<p class="subtitle">Cardiac Health Management System</p>

<form id="loginForm">

<div class="input-box">

<label>Username</label>

<input
type="text"
id="username"
placeholder="Enter Username"
required>

</div>

<div class="input-box">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

<i class="fas fa-eye" id="toggle"></i>

</div>

<div class="options">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">

<i class="fas fa-right-to-bracket"></i>

Login

</button>

<div class="loading" id="loading">

<i class="fas fa-spinner fa-spin"></i>

Authenticating...

</div>

<div id="error"></div>

</form>

<div class="footer">

© 2026 HeartCare AI

</div>

</div>

<script>

const toggle=document.getElementById("toggle");

const password=document.getElementById("password");

toggle.onclick=()=>{

if(password.type==="password"){

password.type="text";

toggle.classList.replace("fa-eye","fa-eye-slash");

}else{

password.type="password";

toggle.classList.replace("fa-eye-slash","fa-eye");

}

};

document.getElementById("loginForm").addEventListener("submit",async(e)=>{

e.preventDefault();

document.getElementById("loading").style.display="block";

document.getElementById("error").style.display="none";

const username=document.getElementById("username").value;

const password=document.getElementById("password").value;

try{

const response=await fetch("http://localhost:5000/api/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

username,

password

})

});

const data=await response.json();

if(data.success){

localStorage.setItem("isLoggedIn","true");

localStorage.setItem("currentUser",JSON.stringify(data.user));

window.location.href="index.html";

}else{

throw new Error(data.error);

}

}catch(err){

document.getElementById("loading").style.display="none";

const error=document.getElementById("error");

error.style.display="block";

error.innerHTML=err.message;

}

});

</script>

</body>
</html>
